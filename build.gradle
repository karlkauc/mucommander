task windowsPortable(dependsOn: 'winAppImage', type: Zip) {
    group = 'Installer'
    description = 'Creates portable Windows zip with bundled JRE'

    archiveBaseName = 'mucommander'
    archiveVersion = project.version + '-' + project.ext.release + '-' + project.ext.arch
    archiveClassifier = 'portable-windows'
    archiveExtension = 'zip'

    into 'muCommander'
    from "${buildDir}/muCommander"

    from ({ new File(temporaryDir, '.portable').createNewFile(); temporaryDir }) {
        include '.portable'
        into 'app'
    }
}

task linuxPortable(dependsOn: 'linuxAppImage', type: Tar) {
    group = 'Installer'
    description = 'Creates portable Linux tarball with bundled JRE'

    archiveBaseName = 'mucommander'
    archiveVersion = project.version + '-' + project.ext.release + '-' + project.ext.arch
    archiveClassifier = 'portable-linux'
    archiveExtension = 'tgz'
    compression = Compression.GZIP

    into 'muCommander'
    from "${buildDir}/muCommander"

    from ({ new File(temporaryDir, '.portable').createNewFile(); temporaryDir }) {
        include '.portable'
        into 'lib/app'
    }
}

task macosPortable(dependsOn: 'macAppImage', type: Tar) {
    group = 'Installer'
    description = 'Creates portable macOS tarball with bundled JRE'

    archiveBaseName = 'mucommander'
    archiveVersion = project.version + '-' + project.ext.release + '-' + project.ext.arch
    archiveClassifier = 'portable-macos'
    archiveExtension = 'tgz'
    compression = Compression.GZIP

    from ("${buildDir}") {
        include 'muCommander.app/**'
    }

    from ({ new File(temporaryDir, '.portable').createNewFile(); temporaryDir }) {
        include '.portable'
        into 'muCommander.app/Contents/app'
    }
}

